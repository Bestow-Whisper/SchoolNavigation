<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园导航 - 发布公告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1677FF',
                        neutral: '#F5F7FA',
                        textMain: '#333647',
                        textSecondary: '#86909C',
                        warning: '#FF7D00',    // 重要公告色
                        danger: '#F53F3F'      // 紧急公告色
                    },
                    boxShadow: {
                        'card': '0 2px 12px 0 rgba(0, 0, 0, 0.08)',
                        'card-hover': '0 4px 16px 0 rgba(0, 0, 0, 0.12)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .nav-btn {
                @apply w-[80px] h-[50px] flex flex-col items-center justify-center cursor-pointer transition-all duration-300;
            }
            .nav-active {
                @apply bg-primary text-white rounded-lg;
            }
            .nav-inactive {
                @apply hover:bg-neutral rounded-lg;
            }
            .card-hover {
                @apply hover:shadow-card-hover hover:-translate-y-1 transition-all duration-300;
            }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen font-sans text-textMain">
    <!-- 导航栏：保持样式统一，公告按钮为激活态 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- 左侧logo -->
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white mr-2">
                            <i class="fa fa-map-marker"></i>
                        </div>
                        <span class="text-lg font-medium">校园导航</span>
                        <span class="text-xs text-textSecondary ml-1">Campus Navigator</span>
                    </div>
                </div>
                <!-- 右侧导航按钮 -->
                <div class="flex items-center space-x-1">
                    <div class="nav-btn nav-inactive" onclick="window.location.href='map.html'">
                        <i class="fa fa-map-marker text-sm"></i>
                        <span class="text-xs mt-1">地图</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='search.html'">
                        <i class="fa fa-search text-sm"></i>
                        <span class="text-xs mt-1">搜索</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='route.html'">
                        <i class="fa fa-road text-sm"></i>
                        <span class="text-xs mt-1">路线</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='favorites.html'">
                        <i class="fa fa-star text-sm"></i>
                        <span class="text-xs mt-1">收藏</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='posts.html'">
                        <i class="fa fa-comment text-sm"></i>
                        <span class="text-xs mt-1">帖子</span>
                    </div>
                    <div class="nav-btn nav-active" onclick="window.location.href='notices.html'">
                        <i class="fa fa-bell text-sm"></i>
                        <span class="text-xs mt-1">公告</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='profile.html'">
                        <i class="fa fa-user text-sm"></i>
                        <span class="text-xs mt-1">我的</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 核心内容：仅保留发布公告表单 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="max-w-3xl mx-auto">
            <!-- 返回按钮 -->
            <div class="mb-6">
                <button onclick="window.location.href='notices.html'" class="flex items-center text-primary hover:text-primary/80 transition-colors">
                    <i class="fa fa-arrow-left mr-1"></i>
                    <span>返回公告列表</span>
                </button>
            </div>

            <!-- 发布公告表单 -->
            <div class="bg-white rounded-xl shadow-card p-6">
                <h2 class="text-xl font-medium mb-4 flex items-center">
                    <i class="fa fa-bell text-primary mr-2"></i>发布系统公告
                </h2>
                
                <form id="noticeForm" class="space-y-4">
                    <!-- 公告标题 -->
                    <div>
                        <label for="noticeTitle" class="block text-sm font-medium text-textMain mb-1">公告标题</label>
                        <input 
                            type="text" 
                            id="noticeTitle" 
                            placeholder="请输入公告标题（如：系统维护通知、功能更新说明...）"
                            class="w-full pl-4 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                            required
                        >
                    </div>
                    
                    <!-- 公告重要程度 -->
                    <div>
                        <label class="block text-sm font-medium text-textMain mb-1">重要程度</label>
                        <div class="flex space-x-4">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="priority" value="normal" class="mr-2" checked>
                                <span class="text-sm">普通</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="priority" value="important" class="mr-2">
                                <span class="text-sm text-warning">重要</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="priority" value="urgent" class="mr-2">
                                <span class="text-sm text-danger">紧急</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- 公告内容 -->
                    <div>
                        <label for="noticeContent" class="block text-sm font-medium text-textMain mb-1">公告内容</label>
                        <textarea 
                            id="noticeContent" 
                            rows="5" 
                            placeholder="请输入公告详细内容..."
                            class="w-full pl-4 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary resize-none"
                            required
                        ></textarea>
                    </div>
                    
                    <!-- 发布人（模拟管理员） -->
                    <div>
                        <label for="noticeAuthor" class="block text-sm font-medium text-textMain mb-1">发布人</label>
                        <input 
                            type="text" 
                            id="noticeAuthor" 
                            value="系统管理员" 
                            readonly
                            class="w-full pl-4 pr-4 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                        >
                    </div>
                    
                    <!-- 发布按钮 -->
                    <button 
                        type="submit"
                        class="w-full bg-primary text-white py-2 rounded-lg hover:bg-primary/90 transition-colors flex items-center justify-center"
                    >
                        <i class="fa fa-send mr-2"></i>发布公告
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- 公告发布逻辑（前端演示） -->
    <script>
        // 模拟权限验证：实际项目中需先验证用户权限，无权限则跳回公告列表
        // 示例：非管理员禁止访问
        // const isAdmin = false;
        // if (!isAdmin) {
        //     alert('您无发布公告权限！');
        //     window.location.href = 'notices.html';
        // }

        // 表单提交逻辑
        document.getElementById('noticeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('noticeTitle').value;
            const content = document.getElementById('noticeContent').value;
            const priority = document.querySelector('input[name="priority"]:checked').value;
            const author = document.getElementById('noticeAuthor').value;
            
            if (title && content) {
                alert(`公告发布成功！\n标题：${title}\n重要程度：${priority}\n发布人：${author}`);
                // 发布成功后返回公告列表
                window.location.href = 'notices.html';
            } else {
                alert('请填写公告标题和内容后发布！');
            }
        });
    </script>
</body>
</html>
