<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园导航 - 搜索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1677FF',
                        neutral: '#F5F7FA',
                        textMain: '#333647',
                        textSecondary: '#86909C'
                    },
                    boxShadow: {
                        'card': '0 2px 12px 0 rgba(0, 0, 0, 0.08)',
                        'card-hover': '0 4px 16px 0 rgba(0, 0, 0, 0.12)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .nav-btn {
                @apply w-[80px] h-[50px] flex flex-col items-center justify-center cursor-pointer transition-all duration-300;
            }
            .nav-active {
                @apply bg-primary text-white rounded-lg;
            }
            .nav-inactive {
                @apply hover:bg-neutral rounded-lg;
            }
            .tag-active {
                @apply bg-primary text-white;
            }
            .tag-inactive {
                @apply bg-white text-textMain hover:bg-neutral transition-colors;
            }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen font-sans text-textMain">
    <!-- 导航栏：加宽拉细 + 居中 + 激活搜索按钮 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- 左侧logo -->
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white mr-2">
                            <i class="fa fa-map-marker"></i>
                        </div>
                        <span class="text-lg font-medium">校园导航</span>
                        <span class="text-xs text-textSecondary ml-1">Campus Navigator</span>
                    </div>
                </div>
                <!-- 右侧导航按钮 -->
                <div class="flex items-center space-x-1">
                    <div class="nav-btn nav-inactive" onclick="window.location.href='map.html'">
                        <i class="fa fa-map-marker text-sm"></i>
                        <span class="text-xs mt-1">地图</span>
                    </div>
                    <div class="nav-btn nav-active">
                        <i class="fa fa-search text-sm"></i>
                        <span class="text-xs mt-1">搜索</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='route.html'">
                        <i class="fa fa-road text-sm"></i>
                        <span class="text-xs mt-1">路线</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='favorites.html'">
                        <i class="fa fa-star text-sm"></i>
                        <span class="text-xs mt-1">收藏</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='posts.html'">
                        <i class="fa fa-comment text-sm"></i>
                        <span class="text-xs mt-1">帖子</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='notices.html'">
                        <i class="fa fa-bell text-sm"></i>
                        <span class="text-xs mt-1">公告</span>
                    </div>
                    <div class="nav-btn nav-inactive" onclick="window.location.href='profile.html'">
                        <i class="fa fa-user text-sm"></i>
                        <span class="text-xs mt-1">我的</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 核心内容：居中 + 限制最大宽度 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="bg-white rounded-xl shadow-card p-6 max-w-3xl mx-auto">
            <!-- 搜索框 -->
            <div class="relative mb-6">
                <input type="text" placeholder="搜索地点、建筑..." 
                       class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary text-base">
                <i class="fa fa-search absolute left-4 top-4 text-textSecondary text-lg"></i>
            </div>

            <!-- 分类标签 -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button class="tag-active px-4 py-2 rounded-full text-sm">
                    <i class="fa fa-th-large mr-1"></i>全部
                </button>
                <button class="tag-inactive px-4 py-2 rounded-full text-sm">
                    <i class="fa fa-university mr-1"></i>教学楼
                </button>
                <button class="tag-inactive px-4 py-2 rounded-full text-sm">
                    <i class="fa fa-book mr-1"></i>图书馆
                </button>
                <button class="tag-inactive px-4 py-2 rounded-full text-sm">
                    <i class="fa fa-cutlery mr-1"></i>餐饮
                </button>
                <button class="tag-inactive px-4 py-2 rounded-full text-sm">
                    <i class="fa fa-futbol-o mr-1"></i>运动
                </button>
                <button class="tag-inactive px-4 py-2 rounded-full text-sm">
                    <i class="fa fa-home mr-1"></i>宿舍
                </button>
            </div>

            <!-- 最近搜索 -->
            <div class="mb-6">
                <h3 class="font-medium text-base mb-3 flex items-center">
                    <i class="fa fa-clock-o text-textSecondary mr-2"></i>最近搜索
                </h3>
                <div class="flex flex-wrap gap-2">
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">图书馆</span>
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">第一食堂</span>
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">体育馆</span>
                </div>
            </div>

            <!-- 热门搜索 -->
            <div>
                <h3 class="font-medium text-base mb-3 flex items-center">
                    <i class="fa fa-fire text-textSecondary mr-2"></i>热门搜索
                </h3>
                <div class="flex flex-wrap gap-2">
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">教学楼A座</span>
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">咖啡厅</span>
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">打印店</span>
                    <span class="bg-neutral px-3 py-1 rounded-full text-sm text-textMain hover:bg-primary/10 cursor-pointer transition-colors">超市</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
